# nginx reverse proxy that terminates mutual-TLS to the MII SU-TermServ Ontoserver.
# matchbox talks plain HTTP to this proxy (txServer = http://mii-termserv-proxy/fhir);
# the proxy presents the institution client certificate to ontoserver.mii-termserv.de.
# SU-TermServ requires mTLS (access restricted to German institutions). RSA key 2048+ (4096 rec.);
# EC keys are NOT supported. Cert must be the full chain (.pem/.crt). See ./README.md.
events {}
http {
  resolver 127.0.0.11 ipv6=off;          # docker embedded DNS (for upstream name resolution)
  server {
    listen 80;

    # MII SU-TermServ (German BfArM terms + SNOMED/LOINC): ICD-10-GM, ICD-O-3, OPS, ATC, ORPHA, Alpha-ID
    location /fhir/ {
      proxy_pass                https://ontoserver.mii-termserv.de/fhir/;
      proxy_ssl_certificate     /certs/client.crt;   # full client chain (PEM)
      proxy_ssl_certificate_key /certs/client.key;   # RSA private key (PEM, unencrypted)
      proxy_ssl_server_name     on;
      proxy_ssl_name            ontoserver.mii-termserv.de;
      proxy_ssl_protocols       TLSv1.2 TLSv1.3;
      proxy_ssl_verify          off;                  # set 'on' + proxy_ssl_trusted_certificate to pin the server CA
      proxy_set_header          Host ontoserver.mii-termserv.de;
      proxy_http_version        1.1;
      proxy_read_timeout        120s;
    }

    # health
    location = /healthz { return 200 "ok\n"; add_header Content-Type text/plain; }
  }
}
